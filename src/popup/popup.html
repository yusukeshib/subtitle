<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimaku</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        width: 300px;
        color: #1a1a1a;
        background: #fafafa;
      }
      .wrap { padding: 14px 16px 16px; }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sub { font-size: 11px; color: #666; margin: 0 0 12px; }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #aaa;
        flex: 0 0 auto;
      }
      .dot.idle   { background: #aaa; }
      .dot.active { background: #1f6feb; }
      .dot.error  { background: #b91c1c; }
      .bar {
        height: 6px;
        background: #e4e4e4;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .bar > div {
        height: 100%;
        background: #1f6feb;
        width: 0%;
        transition: width 0.2s ease;
      }
      .bar.hidden { display: none; }
      button {
        width: 100%;
        padding: 9px 12px;
        font-size: 13px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover:not([disabled]) { background: #333; }
      button[disabled] { opacity: 0.6; cursor: default; }
      button.hidden { display: none; }
      button.secondary {
        background: transparent;
        color: #555;
        border: 1px solid #ccc;
        margin-top: 8px;
      }
      button.secondary:hover:not([disabled]) { background: #f0f0f0; color: #1a1a1a; }
      .err {
        font-size: 12px;
        color: #b91c1c;
        margin: 8px 0 0;
        word-break: break-word;
      }
      .toggles {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eaeaea;
        display: grid;
        gap: 8px;
      }
      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
      }
      .toggle input { margin: 0; }
      .toggle label { cursor: pointer; }
      .lang-row {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eaeaea;
      }
      .lang-row label {
        display: block;
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      .lang-row select {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        padding: 7px 28px 7px 8px;
        font-size: 13px;
        color: #1a1a1a;
        border: 1px solid #ccc;
        border-radius: 6px;
        background:
          #fff
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23666' d='M0 0l5 6 5-6z'/></svg>")
          no-repeat right 10px center;
        font-family: inherit;
        cursor: pointer;
      }
      .meta {
        font-size: 11px;
        color: #888;
        margin-top: 10px;
        line-height: 1.5;
      }
      .meta a { color: #0366d6; text-decoration: none; }
      .meta a:hover { text-decoration: underline; }
      .api-row {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eaeaea;
      }
      .api-row label {
        display: block;
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      .api-row .row {
        display: flex;
        gap: 6px;
      }
      .api-row input {
        flex: 1;
        min-width: 0;
        padding: 7px 8px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        color: #1a1a1a;
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      .api-row select {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        padding: 7px 28px 7px 8px;
        font-size: 13px;
        color: #1a1a1a;
        border: 1px solid #ccc;
        border-radius: 6px;
        background:
          #fff
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23666' d='M0 0l5 6 5-6z'/></svg>")
          no-repeat right 10px center;
        font-family: inherit;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .api-row button {
        flex: 0 0 auto;
        width: auto;
        padding: 7px 10px;
        font-size: 12px;
      }
      .api-row button.secondary {
        width: 100%;
        margin-top: 8px;
      }
      .api-row .connected {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        background: #f1f8f2;
        border: 1px solid #cfe3d1;
        border-radius: 6px;
        font-size: 12px;
      }
      .api-row .connected .label {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #0a7a2f;
      }
      .api-row .connected .label::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #0a7a2f;
      }
      .api-row .connected .link-btn {
        background: transparent;
        color: #555;
        border: none;
        padding: 2px 4px;
        font-size: 12px;
        cursor: pointer;
        width: auto;
        text-decoration: underline;
      }
      .api-row .connected .link-btn:hover:not([disabled]) {
        background: transparent;
        color: #b91c1c;
      }
      .api-row .hint {
        font-size: 10px;
        color: #888;
        margin: 6px 0 0;
        line-height: 1.4;
      }
      .api-row .hint a {
        color: #0366d6;
        text-decoration: none;
      }
      .api-row .hint a:hover { text-decoration: underline; }
      .api-row .saved {
        font-size: 10px;
        color: #0a7a2f;
        margin: 6px 0 0;
        min-height: 12px;
      }
      .api-row .saved.error { color: #b91c1c; }
      .cache-link {
        margin: 12px 0 0;
        padding-top: 10px;
        border-top: 1px solid #eaeaea;
        text-align: center;
      }
      .cache-link-btn {
        background: transparent;
        color: #0366d6;
        border: none;
        padding: 0;
        font-size: 12px;
        cursor: pointer;
        width: auto;
        text-decoration: underline;
      }
      .cache-link-btn:hover { color: #024891; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./popup.tsx"></script>
  </body>
</html>
