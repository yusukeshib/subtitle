<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimaku</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        width: 300px;
        color: #1a1a1a;
        background: #fafafa;
      }
      .wrap { padding: 14px 16px 16px; }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sub { font-size: 11px; color: #666; margin: 0 0 12px; }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #aaa;
        flex: 0 0 auto;
      }
      .dot.idle      { background: #aaa; }
      .dot.detected  { background: #d48a00; }
      .dot.translating { background: #1f6feb; }
      .dot.ready     { background: #1a9b3f; }
      .dot.error     { background: #b91c1c; }
      .bar {
        height: 6px;
        background: #e4e4e4;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .bar > div {
        height: 100%;
        background: #1f6feb;
        width: 0%;
        transition: width 0.2s ease;
      }
      .bar.hidden { display: none; }
      button {
        width: 100%;
        padding: 9px 12px;
        font-size: 13px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover:not([disabled]) { background: #333; }
      button[disabled] { opacity: 0.6; cursor: default; }
      button.hidden { display: none; }
      button.secondary {
        background: transparent;
        color: #555;
        border: 1px solid #ccc;
        margin-top: 8px;
      }
      button.secondary:hover:not([disabled]) { background: #f0f0f0; color: #1a1a1a; }
      .err {
        font-size: 12px;
        color: #b91c1c;
        margin: 8px 0 0;
        word-break: break-word;
      }
      .toggles {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eaeaea;
        display: grid;
        gap: 8px;
      }
      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
      }
      .toggle input { margin: 0; }
      .toggle label { cursor: pointer; }
      .lang-row {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eaeaea;
      }
      .lang-row label {
        display: block;
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      .lang-row select {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        padding: 7px 28px 7px 8px;
        font-size: 13px;
        color: #1a1a1a;
        border: 1px solid #ccc;
        border-radius: 6px;
        background:
          #fff
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23666' d='M0 0l5 6 5-6z'/></svg>")
          no-repeat right 10px center;
        font-family: inherit;
        cursor: pointer;
      }
      .meta {
        font-size: 11px;
        color: #888;
        margin-top: 10px;
        line-height: 1.5;
      }
      .meta a { color: #0366d6; text-decoration: none; }
      .meta a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Jimaku</h1>
      <p class="sub" id="sub">—</p>

      <div class="status-row">
        <span class="dot idle" id="dot"></span>
        <span id="statusText">Checking…</span>
      </div>

      <div class="bar hidden" id="bar"><div id="barFill"></div></div>

      <button id="action" class="hidden" type="button">Generate</button>
      <button id="regenerate" class="secondary hidden" type="button">Regenerate</button>

      <p class="err" id="err" style="display:none;"></p>

      <div class="lang-row">
        <label for="targetLanguage">Target language</label>
        <select id="targetLanguage"></select>
      </div>

      <div class="toggles">
        <div class="toggle">
          <label for="showTranslated">Show translated overlay</label>
          <input id="showTranslated" type="checkbox" />
        </div>
        <div class="toggle">
          <label for="hideOriginal">Hide original subtitles</label>
          <input id="hideOriginal" type="checkbox" />
        </div>
      </div>

      <p class="meta">
        <span id="modelLabel"></span>
        · <a href="#" id="openOptions">Settings</a>
      </p>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
