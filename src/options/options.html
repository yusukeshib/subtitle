<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimaku — Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        max-width: 560px;
        margin: 32px auto;
        padding: 0 16px;
        color: #1a1a1a;
      }
      h1 { font-size: 18px; margin-bottom: 4px; }
      .sub { font-size: 12px; color: #666; margin-bottom: 24px; }
      label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
      input[type="password"], input[type="text"], input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        font-size: 14px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #333; }
      .status { margin-top: 12px; font-size: 13px; color: #0a7a2f; min-height: 18px; }
      .hint { font-size: 12px; color: #666; margin-top: 8px; line-height: 1.5; }
      a { color: #0366d6; }
    </style>
  </head>
  <body>
    <h1>Jimaku</h1>
    <p class="sub">Translates Amazon Prime Video subtitles with Claude.</p>

    <label for="apiKey">Anthropic API key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" />
    <p class="hint">
      Paste a key issued at
      <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">console.anthropic.com</a>.
    </p>
    <p class="hint" style="color:#b46800;">
      ⚠ The API key is stored in <code>chrome.storage.local</code> <strong>in plaintext</strong>. Do not use on shared machines.
    </p>

    <label for="offsetSeconds" style="margin-top: 20px;">Timing offset (seconds)</label>
    <input id="offsetSeconds" type="number" step="0.1" placeholder="0" />
    <p class="hint">
      Positive values delay the overlay (e.g. <code>2</code> shows it 2 s later). Negative values advance it.
    </p>

    <button id="save" type="button">Save</button>
    <div class="status" id="status"></div>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
